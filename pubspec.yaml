name: aura_app
description: "AURA - Virtual Health Companion"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^1.1.1
  percent_indicator: ^4.2.3
  qr_flutter: ^4.1.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  uuid: ^4.4.0
  url_launcher: ^6.3.2
  flutter_animate: ^4.5.2
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
